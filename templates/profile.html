<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
</head>
<body>

<h1>User Profile 👤</h1>

<h2>Welcome {{ request.user.username }} 🎉</h2>

<h3>Your Orders</h3>

<ul>
    {% for order in food_orders %}
        <li>{{ order.item }} - ₹{{ order.price }}</li>
    {% empty %}
        <li>No orders yet</li>
    {% endfor %}
</ul>

<br>

<a href="/">🏠 Home</a>
<br><br>
<a href="/logout/">🚪 Logout</a>

</body>
</html>
