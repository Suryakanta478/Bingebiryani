<!DOCTYPE html>
<html>
<head>
<title>Verify OTP</title>
</head>
<body>

<h2>Verify OTP</h2>

<form method="post">
    {% csrf_token %}

    <input type="email" name="email" placeholder="Enter your email" required>
    <br><br>

    <input type="text" name="otp" placeholder="Enter OTP" required>
    <br><br>

    <button type="submit">Verify</button>
{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}
</form>

</body>
</html>
