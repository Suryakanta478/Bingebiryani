<!DOCTYPE html>
<html>
<head>
    <title>Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-5">

<h2>Book Room</h2>

<form method="post">
    {% csrf_token %}

    <!-- User Details -->
    <input class="form-control mb-3"
           name="name"
           placeholder="Your Name"
           required>

    <input class="form-control mb-3"
           name="phone"
           placeholder="Phone"
           required>

    <!-- Room Selection -->
    <select class="form-control mb-3" name="room">
        {% for room in rooms %}
        <option value="{{ room.id }}">
            {{ room.name }} - ₹{{ room.price }}
        </option>
        {% endfor %}
    </select>

    <!-- Date -->
    <input type="date"
           class="form-control mb-3"
           name="date"
           required>

    <!-- Food Section -->
    <h4>Select Food Items</h4>

    {% for item in items %}
    <div class="mb-2">
        <label>{{ item.name }} (₹{{ item.price }})</label>

        <input type="number"
               name="qty_{{ item.id }}"
               value="0"
               min="0"
               class="form-control"
               onchange="updateTotal()"
               data-price="{{ item.price }}">
    </div>
    {% endfor %}

    <!-- Total -->
    <h4 class="mt-3">Total: ₹ <span id="total">0</span></h4>

    <!-- Submit -->
    <button type="submit" class="btn btn-primary mt-3">
        Book Now
    </button>

</form>

</div>

<script>
function updateTotal() {
    let total = 0;

    document.querySelectorAll("input[type='number']").forEach(input => {
        let qty = parseInt(input.value) || 0;
        let price = parseInt(input.getAttribute("data-price")) || 0;
        total += qty * price;
    });

    document.getElementById("total").innerText = total;
}
</script>

</body>
</html>
