<!DOCTYPE html>
<html>
<head>
    <title>Party Booking</title>

    <!-- Bootstrap -->
    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body>

<div class="container mt-5">
    <h2 class="mb-4">🎉 Party Booking</h2>

    <form method="POST">
        {% csrf_token %}

        <!-- USER INFO -->
        <div class="mb-3">
            <input class="form-control" value="{{ request.user.username }}" readonly>
        </div>

        <div class="mb-3">
            <input class="form-control" value="{{ request.user.email }}" readonly>
        </div>

        <div class="mb-3">
            <input type="text" name="phone" class="form-control" placeholder="Phone Number" required>
        </div>

        <div class="mb-3">
            <input type="date" name="date" class="form-control" required>
        </div>

        <!-- FOOD SECTION -->
        <h4>Select Food Items</h4>

        <div id="food-container"></div>

        <button type="button" class="btn btn-success mt-2" onclick="addFoodRow()">
            + Add Food
        </button>

        <!-- TOTAL -->
        <h4 class="mt-4">Total: ₹ <span id="total">0</span></h4>

        <!-- PAYMENT -->
        <div class="mt-3">
            <label>Payment Option</label>
            <select name="payment_type" class="form-control" onchange="updateTotal()">
                <option value="full">Full Payment</option>
                <option value="advance">Advance (30%)</option>
            </select>
        </div>

        <h4 class="mt-3">Pay Amount: ₹ <span id="pay_amount">0</span></h4>

        <!-- SUBMIT -->
        <div class="mt-4">
            <button class="btn btn-primary w-100" type="submit">
                Proceed to Booking
            </button>
        </div>

    </form>
</div>

<!-- SCRIPT -->
<script>

function addFoodRow() {
    let container = document.getElementById('food-container');

    let row = document.createElement('div');
    row.className = "row mb-2";

    row.innerHTML = `
        <div class="col-6">
            <select name="food[]" class="form-control" onchange="updateTotal()">
                <option value="">Select Food</option>
                {% for food in foods %}
                    <option value="{{food.id}}" data-price="{{food.price}}">
                        {{food.name}} (₹{{food.price}})
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="col-4">
            <input type="number" name="qty[]" value="1" min="1"
                   class="form-control" onchange="updateTotal()">
        </div>

        <div class="col-2">
            <button type="button" class="btn btn-danger"
                    onclick="removeRow(this)">X</button>
        </div>
    `;

    container.appendChild(row);
}


// REMOVE ROW
function removeRow(btn) {
    btn.closest('.row').remove();
    updateTotal();
}


// TOTAL CALCULATION
function updateTotal() {
    let total = 0;

    let foods = document.getElementsByName('food[]');
    let qtys = document.getElementsByName('qty[]');

    for (let i = 0; i < foods.length; i++) {
        let selected = foods[i].options[foods[i].selectedIndex];
        let price = selected.getAttribute('data-price') || 0;
        let qty = qtys[i].value || 0;

        total += price * qty;
    }

    document.getElementById('total').innerText = total;

    // PAYMENT
    let type = document.getElementsByName('payment_type')[0].value;
    let pay = (type === 'advance') ? total * 0.3 : total;

    document.getElementById('pay_amount').innerText = Math.round(pay);
}

</script>

</body>
</html>
