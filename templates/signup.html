<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Lottie Animation -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
}

/* LEFT */
.left {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

/* Typing Text */
.welcome-text {
    color: white;
    font-size: 26px;
    margin-top: 20px;
    text-align: center;
    width: 80%;
    border-right: 3px solid white;
    white-space: nowrap;
    overflow: hidden;
    animation: typing 3s steps(30), blink 0.5s infinite;
}

/* RIGHT */
.right {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: white;
    padding: 35px;
    border-radius: 20px;
    width: 340px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    animation: slideIn 1s ease;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
    transition: 0.3s;
}

input:focus {
    border-color: #ff4b5c;
    outline: none;
    box-shadow: 0 0 8px rgba(255,75,92,0.5);
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg, #ff4b5c, #ff1e3c);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Social */
.social {
    background: #f1f1f1;
    color: black;
    margin-top: 8px;
}

/* Animations */
@keyframes slideIn {
    from { transform: translateX(100px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
}

@keyframes typing {
    from { width: 0 }
    to { width: 100% }
}

@keyframes blink {
    50% { border-color: transparent }
}

a {
    text-decoration: none;
}
</style>

</head>

<body>

<!-- LEFT -->
<div class="left">

    <!-- Realistic Girl Animation -->
    <lottie-player 
        src="https://assets9.lottiefiles.com/packages/lf20_3rwasyjy.json"
        background="transparent"
        speed="1"
        style="width: 280px;"
        loop autoplay>
    </lottie-player>

    <div class="welcome-text">
        Hey! I’ll help you create your account 💖
    </div>

</div>

<!-- RIGHT -->
<div class="right">
    <div class="box">

        <h2>Create Account 🍗</h2>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="👤 Username" required>
            <input type="email" name="email" placeholder="📧 Email" required>
            <input type="password" name="password" placeholder="🔒 Password" required>

            <button type="submit">✨ Sign Up</button>
        </form>

        <p class="mt-3">
            Already have an account?
            <a href="/login/">Login</a>
        </p>

        <hr>

        <button class="social">Continue with Google</button>
        <button class="social">Continue with Facebook</button>

        <p class="text-muted small mt-2">
            Strong password recommended 💪
        </p>

    </div>
</div>

</body>
</html>
