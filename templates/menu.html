<!DOCTYPE html>
<html>
<head>

<title>Food Menu</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

</head>

<body>

<div class="container mt-5">

<h1 class="text-center">Binge Biryani Menu</h1>

<div class="row">

{% for food in foods %}

<div class="col-md-4">

<div class="card">

<img src="{{food.image.url}}" class="card-img-top">

<div class="card-body">

<h4>{{food.name}}</h4>

<p>₹{{food.price}}</p>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
